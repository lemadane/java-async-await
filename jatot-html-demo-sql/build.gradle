plugins {
    id 'java'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

configurations {
    compilerClasspath
}

dependencies {
    compilerClasspath project(':jatot-compiler')
    implementation project(':jatot-html-runtime')
    implementation project(':jatot-html-spring')
    
    implementation('org.springframework.boot:spring-boot-starter-web:3.3.1') {
        exclude group: 'org.springframework.boot', module: 'spring-boot-starter-tomcat'
    }
    implementation 'org.springframework.boot:spring-boot-starter-jetty:3.3.1'
    implementation 'org.springframework.boot:spring-boot-starter-jdbc:3.3.1'
    runtimeOnly 'com.h2database:h2:2.2.224'

    testImplementation 'org.springframework.boot:spring-boot-starter-test:3.3.1'
    testImplementation platform('org.junit:junit-bom:5.11.4')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.withType(JavaCompile).configureEach {
    options.release = 21
    options.encoding = 'UTF-8'
    options.compilerArgs << '-parameters'
}

tasks.withType(Test).configureEach {
    useJUnitPlatform()
    jvmArgs '-XX:+EnableDynamicAgentLoading'
}

sourceSets {
    main {
        java {
            srcDirs += ['build/generated/sources/jatot/main']
        }
    }
    test {
        java {
            srcDirs += ['build/generated/sources/jatot/test']
        }
        resources {
            srcDirs += ['src/test/jatot']
        }
    }
}

File mainGenDir = layout.buildDirectory.dir("generated/sources/jatot/main").get().asFile
File testGenDir = layout.buildDirectory.dir("generated/sources/jatot/test").get().asFile
def myProjectDir = projectDir

// Compile main Jatot files before Java compilation
tasks.register('compileJatot', JavaExec) {
    group = 'build'
    description = 'Compiles main Jatot source files to Java.'
    classpath = configurations.compilerClasspath
    mainClass = 'io.jatot.cli.JatotCli'
    workingDir = myProjectDir
    
    doFirst {
        mainGenDir.mkdirs()
    }
    
    args 'compile', 'src/main/jatot', '-d', 'build/classes/java/main', '-cp', configurations.compileClasspath.asPath, '--save-java', 'build/generated/sources/jatot/main'
    
    inputs.dir('src/main/jatot').optional()
    outputs.dir('build/generated/sources/jatot/main')
    
    dependsOn project(':jatot-compiler').tasks.named('classes')
    dependsOn project(':jatot-html-runtime').tasks.named('classes')
    dependsOn project(':jatot-html-spring').tasks.named('classes')
}

tasks.named('compileJava') {
    dependsOn tasks.named('compileJatot')
}

// Compile test Jatot files before Java test compilation
tasks.register('compileTestJatot', JavaExec) {
    group = 'build'
    description = 'Compiles test Jatot source files to Java.'
    classpath = configurations.compilerClasspath
    mainClass = 'io.jatot.cli.JatotCli'
    workingDir = myProjectDir
    
    doFirst {
        testGenDir.mkdirs()
    }
    
    args 'compile', 'src/test/jatot', '-d', 'build/classes/java/test', '-cp', configurations.testCompileClasspath.asPath, '--save-java', 'build/generated/sources/jatot/test'
    
    inputs.dir('src/test/jatot').optional()
    outputs.dir('build/generated/sources/jatot/test')
    
    dependsOn project(':jatot-compiler').tasks.named('classes')
    dependsOn project(':jatot-html-runtime').tasks.named('classes')
    dependsOn project(':jatot-html-spring').tasks.named('classes')
}

tasks.named('compileTestJava') {
    dependsOn tasks.named('compileTestJatot')
}

tasks.register('runSqlDemo', JavaExec) {
    group = 'application'
    description = 'Runs the SQL database and ORM demo Spring Boot web application.'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'io.jatot.html.demo.DemoApplication'
}
